spring.application.name=api

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tomasinApi}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=uploads/fotos
app.ia.flask.url=http://localhost:5000/api/procesar

jwt.privateKey=${JWT_SECRET:mySecretKey}
jwt.expiration=${JWT_EXPIRATION:1800000}